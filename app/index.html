<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script type="text/javascript">
        (function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var isApple = /iPad|iPhone|iPod|Macintosh/.test(userAgent);
            
            // Special check for newer iPads that pretend to be Macs
            if (navigator.maxTouchPoints && navigator.maxTouchPoints > 2 && /Macintosh/.test(userAgent)) {
                isApple = true;
            }

            var isAndroid = /Android/.test(userAgent);

            // DESTINATIONS
            var appleStore = "https://apps.apple.com/us/app/id6479258909";
            var googleStore = "https://play.google.com/store/apps/details?id=ai.capitalgain.app";
            var fallbackWeb = "https://capitalgain.ai";

            if (isApple) {
                window.location.href = appleStore;
            } else if (isAndroid) {
                window.location.href = googleStore;
            } else {
                // For non-mobile (Windows/Linux), send to website or Play Store
                window.location.href = appleStore; 
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting to the appropriate store...</p>
</body>
</html>
