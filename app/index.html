<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script type="text/javascript">
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // Destinations
            var appleStore = "https://apps.apple.com/us/app/id6479258909";
            var googleStore = "https://play.google.com/store/apps/details?id=ai.capitalgain.app";

            // 1. Explicit iOS Check (iPhone, iPad, iPod)
            var isIOS = /iPhone|iPad|iPod/.test(ua);
            
            // 2. Modern iPad/Mac Check
            var isMac = /Macintosh/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            if (isIOS || isMac) {
                window.location.replace(appleStore);
            } else if (/Android/.test(ua)) {
                window.location.replace(googleStore);
            } else {
                // Default fallback for Windows/Other
                window.location.replace(googleStore);
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
